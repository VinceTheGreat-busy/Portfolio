<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            background-color: #f0f0f0;
            box-sizing: border-box;
        }

        ::-webkit-scrollbar {
            width: 0;
        }

        #heading {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            width: 90%;
            max-width: 1200px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            text-align: center;
        }

        #root {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
            width: 90%;
            max-width: 1200px;
            max-height: 60vh;
            background-color: #d0d0d0;
            padding: 20px;
            overflow-y: auto;
            border: 2px solid #8b4a4a;
            box-sizing: border-box;
        }

        .product {
            border: 1px solid #ccc;
            padding: 15px;
            background-color: #e0e0e0;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .product button {
            padding: 8px 12px;
            border: none;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .product button:hover {
            background-color: #0056b3;
        }

        #cart {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
            z-index: 1000;
        }

        #cart-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #cart-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 1200px;
            max-height: 10vh;
            overflow-y: auto;
            border: 1px solid black;
            padding: 10px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ccc;
            padding: 5px 10px;
            border-radius: 4px;
        }

        #cart-items div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }

        #cart-items div:last-child {
            border-bottom: none;
        }

        #cart-total {
            font-weight: bold;
            min-width: 150px;
            text-align: right;
        }

        #msg {
            margin-top: 10px;
            color: green;
        }

        /* 🌐 Responsive Breakpoints */
        @media (max-width: 768px) {
            #heading {
                flex-direction: column;
            }

            #cart {
                width: 95%;
                top: 5%;
                padding: 15px;
            }

            .product button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            #root {
                grid-template-columns: 1fr;
                padding: 10px;
            }

            .product {
                padding: 10px;
            }

            #cart {
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <div id="heading">
        <h1>Products</h1>
        <button onclick="loadCart()">Carts</button>
    </div>
    <div id="root"></div>
    <div id="msg"></div>
    <div id="cart" style="display:none;">
        <h2>Shopping Cart</h2>
        <div id="cart-content">
            <div id="cart-items"></div>
        </div>
        <button onclick="closeCart()">Close Cart</button>
        <button onclick="clearCart()">Clear Cart</button>
        <button onclick="checkout()">Checkout</button>
        <div id="cart-total"></div>
    </div>
    <script src="index.js"></script>
    <script src="cart.js"></script>
</body>

</html>
